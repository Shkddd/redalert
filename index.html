<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>红色警戒 - 网页版</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="game-container">
<div class="game-wrapper">
  <canvas id="gameCanvas" width="800" height="600" tabindex="0"></canvas>
  <div class="sidebar">
    <h2>⚡ 红色警戒</h2>
    <div class="resource-bar">
      <span class="credits" id="creditsDisplay">💰 10000</span>
      <span class="ore" id="oreDisplay">🪨 0</span>
      <span class="power" id="powerDisplay">⚡ 50</span>
    </div>
    <div class="sidebar-section">
      <div class="label">🏗️ 建筑</div>
      <div class="btn-group">
        <button class="btn primary" onclick="placeBuilding('power_plant')">发电厂<span class="cost">$800</span></button>
        <button class="btn primary" onclick="placeBuilding('ore_refinery')">矿石精炼厂<span class="cost">$2000</span></button>
        <button class="btn primary" onclick="placeBuilding('barracks')">兵营<span class="cost">$1000</span></button>
        <button class="btn primary" onclick="placeBuilding('war_factory')">战车工厂<span class="cost">$2000</span></button>
        <button class="btn primary" onclick="placeBuilding('turret')">炮塔<span class="cost">$1500</span></button>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="label">🎖️ 单位</div>
      <div class="btn-group">
        <button class="btn" onclick="trainUnit('rifle')">步兵<br><span class="cost">$200</span></button>
        <button class="btn" onclick="trainUnit('tank')">坦克<br><span class="cost">$800</span></button>
        <button class="btn" onclick="trainUnit('jeep')">吉普车<br><span class="cost">$500</span></button>
        <button class="btn blue" onclick="trainUnit('mining_truck')">矿车<br><span class="cost">$1200</span></button>
        <button class="btn" onclick="trainUnit('repair_vehicle')" style="border-color:#44ccaa;color:#44ccaa;">修理车<br><span class="cost">$1000</span></button>
      </div>
    </div>
    <div class="status-bar" id="statusBar">
      <div>选择: <span class="highlight" id="selInfo">无</span></div>
      <div id="unitDetail" style="font-size:11px;color:#aaa;"></div>
      <div style="margin-top:4px;">敌军: <span class="enemy" id="enemyCount">0</span></div>
      <div style="margin-top:2px;font-size:10px;color:#555;">位置: <span id="coordDisplay">0,0</span></div>
    </div>
    <div class="minimap-box"><canvas id="minimap" width="210" height="100"></canvas></div>
    <div class="controls-hint">左键选择 · 右键移动/攻击<br>WASD/方向键/鼠标边缘滚屏<br>点击小地图切换视野 · 点击矿脉查看储量</div>
  </div>
</div>
</div>
<script src="game.js"></script>
</body>
</html>
